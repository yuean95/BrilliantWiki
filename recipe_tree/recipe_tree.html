<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
.item {
    display:inline-block;
    text-align:center;
    margin:20px;
    position:relative;
}

.item img {
    width:64px;
    height:64px;
    image-rendering:pixelated;
}

.recipe {
    display:none;
    position:absolute;
    background:#222;
    color:white;
    padding:10px;
    border:1px solid white;
    width:150px;
}

.item:hover .recipe {
    display:block;
}

.row {
    display:flex;
    align-items:center;
}

.arrow {
    font-size:40px;
}
</style>

</head>


<body>

<h1>Minecraft Recipe Tree</h1>

<div id="tree"></div>


<script>

const items = {

    iron_pickaxe:{
        name:"鐵鎬",
        image:"iron_pickaxe.png"
    },

    iron_ingot:{
        name:"鐵錠",
        image:"iron_ingot.png"
    },

    iron_ore:{
        name:"鐵礦石",
        image:"iron_ore.png"
    },

    stick:{
        name:"木棍",
        image:"stick.png"
    }

};


const recipes = {

    iron_pickaxe:{
        input:[
            "iron_ingot",
            "stick"
        ]
    },

    iron_ingot:{
        input:[
            "iron_ore"
        ]
    }

};



function createItem(id)
{
    let data = items[id];

    let div=document.createElement("div");
    div.className="item";


    div.innerHTML=`
        <img src="${data.image}">
        <div>${data.name}</div>

        <div class="recipe">
            合成需要:<br>
            ${recipes[id]?.input.map(
                x=>items[x].name
            ).join("<br>") || "無"}
        </div>
    `;

    return div;
}



let tree=document.getElementById("tree");


// 簡單展示鐵鎬

let row=document.createElement("div");
row.className="row";


recipes.iron_pickaxe.input.forEach(x=>{

    row.appendChild(
        createItem(x)
    );

});


let arrow=document.createElement("div");
arrow.className="arrow";
arrow.innerHTML="→";

row.appendChild(arrow);


row.appendChild(
    createItem("iron_pickaxe")
);


tree.appendChild(row);



</script>

</body>
</html>
