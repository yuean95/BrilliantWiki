<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Recipe Tree</title>

<style>
body {
    background: #202020;
    color: white;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#recipes {
    width: 100%;
    max-width: 900px;
}

.recipe-card {
    background: #303030;
    border: 2px solid #777;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
}

.item {
    position: relative;
    text-align: center;
    cursor: pointer;
}

.item img {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
}

.item-name {
    margin-top: 5px;
}

.tooltip {
    display: none;
    position: absolute;

    bottom: 85px;
    left: 50%;
    transform: translateX(-50%);

    background: #111;
    border: 2px solid #aaa;
    padding: 10px;

    width: 180px;
    z-index: 10;
}

.item.show .tooltip {
    display: block;
}

@media (hover:hover) {
    .item:hover .tooltip {
        display: block;
    }
}

.crafting {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    gap: 4px;
}

.cell {
    width: 64px;
    height: 64px;

    background: #555;

    display: flex;
    align-items: center;
    justify-content: center;
}

.cell .item img {
    width: 56px;
    height: 56px;
}

.arrow {
    font-size: 40px;
}

.furnace {
    display: flex;
    align-items: center;
    gap: 15px;
}

@media(max-width:600px) {

    .recipe-card {
        flex-direction: column;
    }

    .tooltip {
        position: fixed;
        bottom: 20px;
        left: 50%;
    }
}
</style>

</head>


<body>

<h1>Minecraft Recipe Tree</h1>

<div id="recipes">
載入中...
</div>


<script>

let items = {};
let recipes = {};


Promise.all([
    fetch("items.json").then(r => r.json()),
    fetch("recipes.json").then(r => r.json())
])
.then(([itemData, recipeData]) => {

    items = itemData;
    recipes = recipeData;

    render();

})
.catch(() => {

    document.getElementById("recipes").innerHTML =
        "資料載入失敗";

});



function createItem(id) {

    if (!id || !items[id])
        return "";


    let item = items[id];


    return `
    <div class="item" onclick="toggleTooltip(event,this)">

        <img src="resource/${item.image}">

        <div class="item-name">
            ${item.name}
        </div>

        <div class="tooltip">
            ${item.name}
        </div>

    </div>
    `;
}



function createCrafting(pattern) {

    return `
    <div class="crafting">

    ${
        pattern.flat().map(id => {

            return `
            <div class="cell">
                ${createItem(id)}
            </div>
            `;

        }).join("")
    }

    </div>
    `;
}



function createFurnace(recipe, output) {

    return `
    <div class="furnace">

        ${createItem(recipe.input)}

        <div class="arrow">
            🔥 →
        </div>

        ${createItem(output)}

    </div>
    `;
}



function render() {

    let box =
        document.getElementById("recipes");


    box.innerHTML = "";


    for (let output in recipes) {

        let recipe = recipes[output];


        let card =
            document.createElement("div");

        card.className =
            "recipe-card";


        if (recipe.type === "crafting") {

            card.innerHTML = `

            ${createCrafting(recipe.pattern)}

            <div class="arrow">
                →
            </div>

            ${createItem(output)}

            `;

        }


        else if (recipe.type === "furnace") {

            card.innerHTML =
                createFurnace(recipe, output);

        }


        box.appendChild(card);

    }

}



function toggleTooltip(event, element) {

    event.stopPropagation();


    document
    .querySelectorAll(".item.show")
    .forEach(item => {

        if (item !== element)
            item.classList.remove("show");

    });


    element.classList.toggle("show");

}



document.body.onclick = () => {

    document
    .querySelectorAll(".item.show")
    .forEach(item => {

        item.classList.remove("show");

    });

};

</script>

</body>

</html>
