<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Recipe Tree</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre/cytoscape-dagre.js"></script>
    <style>
        body {
            margin: 0;
            background: #202020;
            color: white;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }
        
        #graph {
            width: 100vw;
            height: 100vh;
        }
        
        .node-label {
            position: absolute;
            background: #111;
            border: 2px solid #aaa;
            border-radius: 5px;
            padding: 10px;
            display: none;
            width: 220px;
            z-index: 10;
            pointer-events: none;
        }
        
        .crafting {
            display: grid;
            grid-template-columns: repeat(3,45px);
            gap: 2px;
            margin-top: 8px;
        }
        
        .cell {
            width: 45px;
            height: 45px;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .cell img {
            width: 38px;
            height: 38px;
            image-rendering: pixelated;
        }
        
        .furnace {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="graph"></div>
    <div id="tooltip" class="node-label"></div>
    <script>
        let items = {};
        let recipes = {};
        let cy;
    
        const tooltip = document.getElementById("tooltip");
    
        Promise.all([
            fetch("items.json").then(r => r.json()),
            fetch("recipes.json").then(r => r.json())
        ])
        .then(([itemData, recipeData]) => {
            items = itemData;
            recipes = recipeData;
    
            createGraph();
        })
        .catch(error => {
            document.body.innerHTML = "資料載入失敗";
            console.error(error);
        });
    
    
        function createGraph() {
            const nodes = [];
            const edges = [];
            const nodeSet = new Set();
    
            function addNode(id) {
                if (!nodeSet.has(id)) {
                    nodeSet.add(id);
    
                    nodes.push({
                        data: {
                            id: id,
                            name: items[id]?.name ?? id,
                            image: `resource/${items[id]?.image ?? ""}`
                        }
                    });
                }
            }
    
            for (const output in recipes) {
                addNode(output);
    
                recipes[output].input.forEach(input => {
                    addNode(input);
    
                    edges.push({
                        data: {
                            source: input,
                            target: output
                        }
                    });
                });
            }
    
            cy = cytoscape({
                container: document.getElementById("graph"),
    
                elements: {
                    nodes: nodes,
                    edges: edges
                },
    
                style: [
                    {
                        selector: "node",
                        style: {
                            "label": "data(name)",
                            "background-image": "data(image)",
                            "background-fit": "contain",
                            "background-color": "#555",
                            "width": 70,
                            "height": 70,
                            "font-size": 12,
                            "color": "white",
                            "text-valign": "bottom",
                            "text-margin-y": 8
                        }
                    },
                    {
                        selector: "edge",
                        style: {
                            "width": 2,
                            "line-color": "#aaa",
                            "target-arrow-color": "#aaa",
                            "target-arrow-shape": "triangle"
                        }
                    }
                ],
    
                layout: {
                    name: "dagre",
                    rankDir: "TB",
                    nodeSep: 80,
                    rankSep: 120
                }
            });
    
            cy.on("mouseover", "node", event => {
                showTooltip(
                    event.target.id(),
                    event.originalEvent
                );
            });
    
            cy.on("mouseout", "node", () => {
                hideTooltip();
            });
    
            cy.on("tap", "node", event => {
                showTooltip(
                    event.target.id(),
                    event.originalEvent
                );
            });
        }
            function showTooltip(id, event) {
            const recipe = recipes[id];
    
            if (!recipe) {
                tooltip.innerHTML = items[id]?.name ?? id;
            } else {
                tooltip.innerHTML = createRecipeHTML(id, recipe);
            }
    
            tooltip.style.display = "block";
            tooltip.style.left = `${event.pageX + 15}px`;
            tooltip.style.top = `${event.pageY + 15}px`;
        }
    
    
        function hideTooltip() {
            tooltip.style.display = "none";
        }
    
    
        function createRecipeHTML(id, recipe) {
            let html = `<b>${items[id].name}</b>`;
    
            if (recipe.type === "crafting") {
                html += `<div class="crafting">`;
    
                recipe.pattern.flat().forEach(item => {
                    html += `
                        <div class="cell">
                            ${item ? `<img src="resource/${items[item].image}">` : ""}
                        </div>
                    `;
                });
    
                html += "</div>";
            }
    
            if (recipe.type === "furnace") {
                html += `
                    <div class="furnace">
                        <img width="40" src="resource/${items[recipe.input].image}">
                        🔥 →
                        <img width="40" src="resource/${items[id].image}">
                    </div>
                `;
            }
    
            return html;
        }
    
    
        document.body.addEventListener("click", event => {
            if (!event.target.closest("#graph")) {
                hideTooltip();
            }
        });
    </script>
</body>
</html>
