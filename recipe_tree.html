<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Recipe Tree</title>

<style>
body {
    background: #222;
    color: white;
    font-family: sans-serif;
}

.tree {
    display: flex;
    align-items: center;
    gap: 30px;
    margin: 50px;
}

.item {
    position: relative;
    text-align: center;
}

.item img {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
    background: #555;
    border: 2px solid #aaa;
}

.name {
    margin-top: 5px;
}

/* 配方提示框 */
.recipe {
    display: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 90px;

    background: #111;
    border: 2px solid #aaa;
    padding: 10px;
    width: 180px;

    z-index: 10;
}

/* 滑鼠移入 */
.item:hover .recipe {
    display: block;
}

.arrow {
    font-size: 40px;
}
</style>

</head>

<body>

<h1>簡易合成樹</h1>

<div class="tree">

    <!-- 原木 -->
    <div class="item">
        <img src="oak_log.png">
        <div class="name">橡木原木</div>

        <div class="recipe">
            自然生成<br>
            可採集
        </div>
    </div>


    <div class="arrow">
        →
    </div>


    <!-- 木板 -->
    <div class="item">
        <img src="oak_planks.png">
        <div class="name">橡木木板</div>

        <div class="recipe">
            合成：<br>
            橡木原木 ×1<br>
            ↓<br>
            木板 ×4
        </div>
    </div>


    <div class="arrow">
        →
    </div>


    <!-- 工作台 -->
    <div class="item">
        <img src="crafting_table.png">
        <div class="name">工作台</div>

        <div class="recipe">
            合成：<br>
            木板 ×4<br>
            ↓<br>
            工作台 ×1
        </div>
    </div>


</div>


</body>
</html>
